<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>طباعة بيان الشغل اليومي</title>
<style>
@page {
  size: A4 landscape;
  margin: 10mm;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  padding: 18px;
  font-family: "Tahoma", "Segoe UI", Arial, sans-serif;
  color: #1f2937;
  background: #fff;
}

body.printing {
  padding: 0;
}

.print-shell {
  max-width: 100%;
}

.print-title {
  margin: 0 0 8px;
  text-align: center;
  color: #223547;
  font-size: 22px;
}

.print-date {
  margin: 0 0 14px;
  text-align: right;
  color: #223547;
  font-size: 14px;
  font-weight: 700;
}

table {
  width: 100%;
  border-collapse: collapse;
  table-layout: fixed;
}

th, td {
  border: 1px solid #b9c6d3;
  padding: 6px 4px;
  text-align: center;
  font-size: 10px;
  word-break: break-word;
}

th {
  background: #ffffff;
  color: #000000;
  font-weight: 700;
  white-space: normal;
  line-height: 1.3;
}

.actions {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 18px;
}

button {
  border: none;
  border-radius: 10px;
  padding: 10px 14px;
  cursor: pointer;
  font-size: 0.95rem;
  font-weight: 700;
  color: #fff;
}

.print-btn {
  background: #2f89d9;
}

.back-btn {
  background: #223547;
}

.status {
  text-align: center;
  color: #697586;
  padding: 30px 0;
}

@media print {
  html, body {
    width: 100%;
    margin: 0 !important;
    padding: 0 !important;
    background: #fff !important;
  }

  body * {
    visibility: hidden !important;
  }

  #printShell,
  #printShell * {
    visibility: visible !important;
  }

  #printShell {
    position: absolute;
    inset: 0;
    width: 100%;
    padding: 8mm;
    background: #fff;
  }

  .actions {
    display: none !important;
    visibility: hidden !important;
  }

  table {
    width: 100% !important;
  }
}
</style>
</head>
<body>
<div class="print-shell" id="printShell">
  <div class="status" id="statusMessage">جارٍ تحميل بيانات الطباعة...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyARqSgfh78TqFQ2hhZaAtUaVQFqlPuRM3w",
  authDomain: "trialsafaprices2026.firebaseapp.com",
  databaseURL: "https://trialsafaprices2026-default-rtdb.firebaseio.com",
  projectId: "trialsafaprices2026",
  storageBucket: "trialsafaprices2026.appspot.com",
  messagingSenderId: "177091434445",
  appId: "1:177091434445:web:568b6ae3ba270a21d4d684"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.database();
const printShell = document.getElementById("printShell");
const params = new URLSearchParams(window.location.search);
const printDateValue = params.get("date") || "";

function normalizeRow(row, index = 0) {
  return {
    id: row && row.id ? row.id : "legacy-" + index,
    order: row && typeof row.order === "number" ? row.order : index,
    containerCount: row && row.containerCount ? row.containerCount : "",
    size: row && row.size ? row.size : "",
    place: row && row.place ? row.place : "",
    move: row && row.move ? row.move : "",
    agency: row && row.agency ? row.agency : "",
    type: row && row.type ? row.type : "",
    client: row && row.client ? row.client : "",
    notes: row && row.notes ? row.notes : ""
  };
}

function formatArabicDate(date) {
  return new Date(date + "T00:00:00").toLocaleDateString("ar-EG", {
    weekday: "long",
    year: "numeric",
    month: "long",
    day: "numeric"
  });
}

function sortRows(rows) {
  return [...rows].sort((a, b) => Number(a.order) - Number(b.order));
}

function renderRows(date, rows) {
  return sortRows(rows).map(row => `
    <tr>
      <td>${date}</td>
      <td>${row.containerCount || ""}</td>
      <td>${row.size || ""}</td>
      <td>${row.place || ""}</td>
      <td>${row.move || ""}</td>
      <td>${row.agency || ""}</td>
      <td>${row.type || ""}</td>
      <td>${row.client || ""}</td>
      <td>${row.notes || ""}</td>
    </tr>
  `).join("");
}

function goBack() {
  if (document.referrer && document.referrer.includes("daily.html")) {
    window.location.href = "daily.html";
    return;
  }
  window.location.href = "daily.html";
}

window.addEventListener("afterprint", () => {
  document.body.classList.remove("printing");
});

function renderPrintPage(date, rows) {
  printShell.innerHTML = `
    <h1 class="print-title">بيان الشغل اليومي</h1>
    <div class="print-date">${formatArabicDate(date)}</div>
    <div class="status" style="padding: 0 0 14px; font-size: 0.92rem;">اضغط زر طباعة بالأسفل لفتح نافذة الطباعة يدويًا.</div>
    <table>
      <thead>
        <tr>
          <th>التاريخ</th>
          <th>عدد الحاويات</th>
          <th>الحجم</th>
          <th>المكان</th>
          <th>مكان النقلة</th>
          <th>التوكيل</th>
          <th>نوع</th>
          <th>العميل</th>
          <th>ملاحظات</th>
        </tr>
      </thead>
      <tbody>${renderRows(date, rows)}</tbody>
    </table>
    <div class="actions">
      <button class="print-btn" onclick="triggerPrint()">طباعة</button>
      <button class="back-btn" onclick="goBack()">رجوع</button>
    </div>
  `;
}

function triggerPrint() {
  document.body.classList.add("printing");
  setTimeout(() => {
    window.print();
  }, 80);
}

firebase.auth().onAuthStateChanged(user => {
  if (!user) {
    window.location.href = "index.html";
    return;
  }

  if (!printDateValue) {
    printShell.innerHTML = '<div class="status">تعذر تحديد التاريخ المطلوب للطباعة.</div>';
    return;
  }

  db.ref("daily/" + printDateValue + "/rows").once("value")
    .then(snap => {
      const raw = snap.val() || {};
      const rows = Object.keys(raw).map((rowId, index) => normalizeRow({ ...raw[rowId], id: rowId }, index));
      renderPrintPage(printDateValue, rows);
    })
    .catch(() => {
      printShell.innerHTML = '<div class="status">تعذر تحميل بيانات الطباعة الآن.</div>';
    });
});
</script>
</body>
</html>
